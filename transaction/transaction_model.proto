syntax = "proto3";

package transaction;
option go_package = "github.com/RomanShidlovsky/contracts/transaction/go;transaction";

import "google/protobuf/timestamp.proto";

message Transaction {
    string id = 1;
    string type = 2; // TRANSFER | DEPOSIT | WITHDRAW
    string status = 3; // INITIATED | DONE | FAILED
    google.protobuf.Timestamp created_at = 4;
    google.protobuf.Timestamp updated_at = 5;
}

message TransactionEntry {
    string id = 1;
    string transaction_id = 2;
    string account_id = 3;
    string direction = 4; // DEBIT | CREDIT
    double amount = 5;
}

message TransactionDetails {
    Transaction transaction = 1;
    repeated TransactionEntry entries = 2;
}