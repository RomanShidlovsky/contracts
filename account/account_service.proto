syntax = "proto3";

package account;
option go_package = "github.com/RomanShidlovsky/contracts/account/go;account";

import "google/protobuf/empty.proto"; 
import "account_model.proto"; 
import "pagination/pagination.proto"; 

service Account {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
    rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
    rpc UpdateUser(UpdateUserRequest) returns (google.protobuf.Empty);

    // управление балансом
    rpc Deposit(DepositRequest) returns (DepositResponse);
    rpc Withdraw(WithdrawRequest) returns (WithdrawResponse);
    rpc Transfer(TransferRequest) returns (TransferResponse);
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
}

message CreateUserRequest {
    CreateUser user = 1;
}

message CreateUserResponse {
    User user = 1;
}

message GetUserRequest {
    uint64 user_id = 1;
}

message GetUserResponse {
    User user = 1;
}

message GetUsersRequest {
    pagination.Pagination pagination = 1;
}

message GetUsersResponse {
    repeated User users = 1;
    pagination.Pagination pagination = 2;
}

message DeleteUserRequest {
    uint64 user_id = 1;
}

message UpdateUserRequest {
    uint64 user_id = 1;
    User user = 2;
}

message DepositRequest {
    uint64 user_id = 1;
    int64 amount = 2;
    uint64 operation_id = 3;
}

message DepositResponse {
    string status = 1; // "completed" / "failed"
    int64 balance = 2;
}

message WithdrawRequest {
    uint64 user_id = 1;
    int64 amount = 2;
    string operation_id = 3;
}

message WithdrawResponse {
    string status = 1;
    int64 balance = 2;
}

// Перевод
message TransferRequest {
    uint64 user_id = 1;
    uint64 recipient_id = 2;
    int64 amount = 3;
    string operation_id = 4;
}

message TransferResponse {
    string status = 1;
    int64 user_balance = 2;
    int64 recipient_balance   = 3;
}

// Получение баланса
message GetBalanceRequest {
    uint64 user_id = 1;
}

message GetBalanceResponse {
    int64 balance = 1;
}